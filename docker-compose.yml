version: "3.9"

services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: studyai-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smart_study_scheduler

  # ─── AI / ML Service (FastAPI) ───────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: studyai-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ai_models:/app/models   # persist trained model files

  # ─── Backend (Node.js) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studyai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - ai-service
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/smart_study_scheduler
      - AI_SERVICE_URL=http://ai-service:8000

  # ─── Frontend (React / Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studyai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  ai_models:
